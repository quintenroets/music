[project]
name = "musicmaster"
version = "1.2.1"
description = "Python package"
authors = [{name = "Quinten Roets", email = "qdr2104@columbia.edu"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
]

[project.optional-dependencies]
dev = [
    "build",
    "bump2version",
    "hypothesis",
    "pre-commit",
    "pytest",
]

[project.urls]
"Source Code" = "https://github.com/quintenroets/music"

[project.scripts]
music = "music.cli:main"

[tool.setuptools.package-data]
music = ["py.typed"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.ruff]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "UP",  # pyupgrade
]
fix = true

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.mypy]
strict = true

disallow_untyped_defs = true  # force argument & return type annotations
disallow_untyped_decorators = true
